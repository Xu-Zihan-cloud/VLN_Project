# configs/model/modular_agent.yaml

_target_: src.models.modular_agent.ModularVLNAgent

# LLM Planner Settings
llm:
  model_name: "qwen2.5:7b-instruct-q4_K_M"
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.0
  max_tokens: 512

# Perception Settings
perception:
  mask_rcnn_weights: "mask_rcnn_resnet50_fpn_coco"
  confidence_threshold: 0.5

# Navigation Settings
navigation:
  grid_size: 0.25
  turn_angle: 90
  max_steps: 100
